name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore src/ApiBook.sln

    - name: Build
      run: dotnet build src/ApiBook.sln --configuration Release

    - name: Publish
      run: dotnet publish src/ApiBook.Api -c Release -o publish

    # 🛑 Stop IIS
    - name: Stop IIS Site
      run: powershell Stop-WebSite -Name "ApiBook"

    # 🧱 App Offline (important)
    - name: Enable App Offline
      run: echo "offline" > C:\inetpub\ApiBook\app_offline.htm

    # 📂 Copy Files
    - name: Copy Files
      run: xcopy /E /Y publish\* C:\inetpub\ApiBook\

    # 🧹 Remove Offline File
    - name: Remove App Offline
      run: del C:\inetpub\ApiBook\app_offline.htm

    # ▶ Start IIS
    - name: Start IIS Site
      run: powershell Start-WebSite -Name "ApiBook"
