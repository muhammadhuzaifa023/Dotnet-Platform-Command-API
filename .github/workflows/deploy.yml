name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Publish
      run: dotnet publish ApiBook.Api -c Release -o publish

    - name: Stop IIS Site
      run: powershell Stop-WebSite -Name "ApiBook"

    - name: Copy Files
      run: xcopy /E /Y publish\* C:\inetpub\wwwroot\ApiBook\

    - name: Start IIS Site
      run: powershell Start-WebSite -Name "ApiBook"
