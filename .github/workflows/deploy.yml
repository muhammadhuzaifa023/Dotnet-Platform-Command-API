name: Deploy to IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore src/ApiBook.sln

    - name: Build
      run: dotnet build src/ApiBook.sln --configuration Release

    - name: Publish
      run: dotnet publish src/ApiBook.Api -c Release -o publish

    # 🛑 Stop IIS
    - name: Stop IIS Site
      run: powershell Stop-WebSite -Name "ApiBook"

    # 🧱 App Offline
    - name: Enable App Offline
      run: echo "offline" > C:\inetpub\ApiBook\app_offline.htm

    # 📂 Copy Files
    - name: Copy Files
      run: |
        robocopy publish C:\inetpub\ApiBook /E /NFL /NDL /NJH /NJS /NC /NS
        exit 0

    # 🔥 SIMPLE & STABLE WEB.CONFIG FIX
    - name: Update web.config (Environment + Logs)
      shell: powershell
      run: |
        $path = "C:\inetpub\ApiBook\web.config"

        $content = Get-Content $path -Raw

        # Enable logs
        $content = $content -replace 'stdoutLogEnabled="false"', 'stdoutLogEnabled="true"'

        # Add environment variable (only if not already present)
        if ($content -notmatch "ASPNETCORE_ENVIRONMENT") {
          $content = $content -replace '</aspNetCore>', '<environmentVariables><environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Development" /></environmentVariables></aspNetCore>'
        }

        Set-Content $path $content

    # 🧹 Remove Offline File
    - name: Remove App Offline
      shell: powershell
      run: |
        if (Test-Path "C:\inetpub\ApiBook\app_offline.htm") {
          Remove-Item "C:\inetpub\ApiBook\app_offline.htm"
        }

    # ▶ Start IIS
    - name: Start IIS Site
      run: powershell Start-WebSite -Name "ApiBook"
